name: Web App CI

on:
  push:
    branches: [master]
    paths:
      - 'web-app/**'
      - '.github/workflows/web-app-ci.yml'
  pull_request:
    paths:
      - 'web-app/**'

concurrency:
  group: web-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - run: npm ci
        working-directory: web-app

      - run: npm run test:unit
        working-directory: web-app

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - run: npm ci
        working-directory: web-app

      - run: npm run build
        working-directory: web-app

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: web-app/dist/
          retention-days: 1

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: web-app/dist/

      - name: Run Lighthouse
        run: |
          npx serve web-app/dist -l 4173 &
          sleep 3
          npx lighthouse http://localhost:4173 \
            --output=json --output-path=lh-report.json \
            --chrome-flags="--headless --no-sandbox" \
            --quiet \
            --only-categories=performance,accessibility,best-practices,seo \
            --preset=desktop

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lh-report.json
          retention-days: 14
