name: Lighthouse CI

on:
  push:
    branches: [master]
    paths:
      - 'web-app/src/**'
      - 'web-app/public/**'
      - 'web-app/vite.config.js'
      - 'web-app/.github/workflows/lighthouse.yml'
  pull_request:
    paths:
      - 'web-app/src/**'
      - 'web-app/public/**'
      - 'web-app/vite.config.js'

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: web-app

      - name: Build
        run: npm run build
        working-directory: web-app

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://atheon-scanner.pages.dev/
            https://atheon-scanner.pages.dev/reports
            https://atheon-scanner.pages.dev/trending
          budgetPath: web-app/.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
