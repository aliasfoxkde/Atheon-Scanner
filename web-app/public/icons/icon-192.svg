          fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Scanning lines -->
    <line x1="20" y1="80" x2="76" y2="80" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="88" x2="76" y2="88" stroke="white" stroke-width="2" opacity="0.4"/>
