<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad2)"/>

  <!-- Shield/Scanner Icon -->
  <g transform="translate(128, 96)">
    <!-- Shield shape -->
    <path d="M128 16L16 56V160C16 213 58 245 128 265C198 245 240 213 240 160V56L128 16Z"
          fill="none" stroke="white" stroke-width="12" stroke-linejoin="round"/>

    <!-- Checkmark -->
    <path d="M80 160L110 190L176 124"
          fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Scanning lines -->
    <line x1="48" y1="200" x2="208" y2="200" stroke="white" stroke-width="6" opacity="0.6"/>
    <line x1="48" y1="220" x2="208" y2="220" stroke="white" stroke-width="6" opacity="0.4"/>
  </g>

  <!-- Atheon attribution text -->
  <text x="256" y="480" text-anchor="middle" fill="white" font-size="28" font-family="Arial, sans-serif" opacity="0.8">
    Atheon Scanner
  </text>
</svg>